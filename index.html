<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>籃球聯賽賽程表 - Pro League</title>
    <style>
        /* NBA 風格深色主題 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            padding: 20px 15px; 
            margin: 0; 
        }
        .container { max-width: 650px; margin: 0 auto; }
        
        /* 標題 */
        h1 { text-align: center; font-size: 1.8em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* 🌟 新版橫向日期篩選器 (參照截圖設計) */
        .date-picker-wrapper {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
        }
        .month-indicator {
            font-size: 1em;
            font-weight: 800;
            color: #f8fafc;
            min-width: 110px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dates-carousel {
            display: flex;
            align-items: center;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            margin-left: 10px;
            border-left: 1px solid #334155;
            padding-left: 10px;
        }
        .nav-arrow {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 1.2em;
            cursor: pointer;
            padding: 0 5px;
            transition: color 0.2s;
        }
        .nav-arrow:hover { color: #f8fafc; }
        .dates-list {
            display: flex;
            overflow-x: auto;
            scrollbar-width: none; /* Firefox 隱藏捲軸 */
            scroll-behavior: smooth;
            gap: 5px;
            flex-grow: 1;
        }
        .dates-list::-webkit-scrollbar { display: none; } /* Chrome/Safari 隱藏捲軸 */
        
        .date-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 8px 12px;
            color: #94a3b8;
            border-bottom: 3px solid transparent;
            min-width: 40px;
            transition: all 0.2s;
        }
        .date-item:hover { color: #e2e8f0; }
        /* 點選後的高亮狀態 */
        .date-item.active {
            color: #f8fafc;
            border-bottom: 3px solid #f8fafc;
        }
        .date-item .day-name { font-size: 0.85em; font-weight: 600; margin-bottom: 4px; }
        .date-item .day-number { font-size: 1.4em; font-weight: 800; }

        /* 賽程卡片設計 */
        .match-card { 
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            padding: 20px; margin-bottom: 20px; border-radius: 12px; 
            border: 1px solid #334155;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4); 
        }
        .match-info { 
            text-align: center; color: #94a3b8; font-size: 0.85em; font-weight: 600; text-transform: uppercase;
            margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; 
        }
        
        /* 計分板排版 */
        .scoreboard { display: flex; justify-content: space-between; align-items: center; }
        .team { display: flex; flex-direction: column; align-items: center; width: 30%; }
        .team-logo { width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .team-name { font-weight: 700; color: #f8fafc; font-size: 1em; text-align: center; }
        
        .score-box { width: 40%; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .score-text { font-size: 2.8em; font-weight: 900; color: #fff; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-family: Impact, "Arial Black", sans-serif; }
        .vs-text { font-size: 1.2em; font-weight: 700; color: #64748b; }
        
        /* 展開詳情按鈕 */
        .toggle-details-btn {
            width: 100%; margin-top: 15px; padding: 10px; background-color: #2563eb; color: white;
            border: none; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase;
            transition: background-color 0.2s;
        }
        .toggle-details-btn:hover { background-color: #1d4ed8; }

        /* 隱藏的媒體連結區塊 */
        .media-links { 
            display: none; 
            margin-top: 15px; padding-top: 15px; border-top: 1px dashed #475569; 
            justify-content: center; gap: 10px; flex-wrap: wrap; 
        }
        .media-links.show { display: flex; animation: fadeIn 0.3s ease-in-out; }
        
        .media-btn { 
            background-color: #334155; color: #f8fafc; text-decoration: none; padding: 8px 16px; 
            border-radius: 20px; font-size: 0.85em; font-weight: 700; transition: all 0.2s; border: 1px solid #475569;
        }
        .media-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .media-btn.photo { background-color: #0369a1; border-color: #0284c7; }
        .media-btn.video { background-color: #be123c; border-color: #e11d48; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏀 ZeroBasketball</h1>
    
    <!-- 新版橫向日期篩選器 -->
    <div class="date-picker-wrapper">
        <div class="month-indicator">
            <span id="display-month-year">Season</span>
            <span>📅 ▾</span>
        </div>
        <div class="dates-carousel">
            <button class="nav-arrow" onclick="scrollDates(-1)">&#10094;</button>
            <div class="dates-list" id="dates-list-container">
                <!-- 日期項目會由 JS 自動生成 -->
            </div>
            <button class="nav-arrow" onclick="scrollDates(1)">&#10095;</button>
        </div>
    </div>
    
    <div id="schedule-container">資料載入中...</div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRQsj3AtyZ5MaLlFq5upWgAbii-HhuUwR5UF6UR9DyhwP21zL7B40k9XHJRxvXP4isymusKVSvY5AuL/pub?output=csv';
    
    let allGames = [];
    let currentSelectedDate = 'all';

    fetch(csvUrl)
        .then(response => response.text())
        .then(csvText => {
            const rows = csvText.split('\n').slice(1);
            
            rows.forEach(row => {
                // 【Bug 修復關鍵】徹底清除每一個欄位可能存在的換行符號 \r 和頭尾空白
                const cols = row.split(',').map(item => item.replace(/\r/g, '').trim());
                if (cols.length < 7 || !cols[0]) return; 

                const gameData = {
                    date: cols[0], 
                    time: cols[1],
                    location: cols[2],
                    team1Name: cols[3],
                    team1Logo: cols[4] || 'https://via.placeholder.com/70/334155/FFFFFF?text=T1',
                    team1Score: cols[5],
                    team2Name: cols[6],
                    team2Logo: cols[7] || 'https://via.placeholder.com/70/334155/FFFFFF?text=T2',
                    team2Score: cols[8],
                    photoLink: cols[9],
                    q1Link: cols[10],
                    q2Link: cols[11],
                    q3Link: cols[12],
                    q4Link: cols[13]
                };
                allGames.push(gameData);
            });

            buildDateCarousel();
            renderGames('all'); // 預設顯示所有比賽
        })
        .catch(error => {
            document.getElementById('schedule-container').innerHTML = '<div style="text-align:center; color:#ef4444;">載入失敗，請確認資料來源。</div>';
        });

    // 解析日期並建立橫向選擇器
    function buildDateCarousel() {
        const container = document.getElementById('dates-list-container');
        // 取出不重複的日期並排序
        const uniqueDates = [...new Set(allGames.map(game => game.date))].sort();
        
        const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        let lastMonthYear = 'Season';

        uniqueDates.forEach(dateStr => {
            const d = new Date(dateStr);
            let dayName = 'Day';
            let dayNum = '--';
            
            // 若日期格式正確，擷取星期與日期
            if (!isNaN(d)) {
                dayName = daysOfWeek[d.getDay()];
                dayNum = d.getDate();
                lastMonthYear = `${months[d.getMonth()]} ${d.getFullYear()}`; // 例如 July 2026
            }

            const div = document.createElement('div');
            div.className = 'date-item';
            div.dataset.date = dateStr; // 將完整日期綁定在標籤上
            div.onclick = () => filterGames(dateStr);
            div.innerHTML = `
                <div class="day-name">${dayName}</div>
                <div class="day-number">${dayNum}</div>
            `;
            container.appendChild(div);
        });

        // 更新左側的月份顯示
        document.getElementById('display-month-year').textContent = lastMonthYear;
    }

    // 箭頭左右滑動功能
    function scrollDates(direction) {
        const list = document.getElementById('dates-list-container');
        const scrollAmount = 100; // 每次點擊滑動的像素
        list.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
    }

    // 處理篩選邏輯與 UI 更新
    function filterGames(clickedDate) {
        // 如果點擊的是「已經被選中」的日期，就取消選擇（顯示所有）
        if (currentSelectedDate === clickedDate) {
            currentSelectedDate = 'all';
        } else {
            currentSelectedDate = clickedDate;
        }

        // 更新日期按鈕的 CSS 高亮狀態
        document.querySelectorAll('.date-item').forEach(el => {
            el.classList.remove('active');
            if (el.dataset.date === currentSelectedDate) {
                el.classList.add('active');
            }
        });

        // 重新渲染畫面
        renderGames(currentSelectedDate);
    }

    function renderGames(selectedDate) {
        const container = document.getElementById('schedule-container');
        container.innerHTML = ''; 

        const filteredGames = selectedDate === 'all' 
            ? allGames 
            : allGames.filter(game => game.date === selectedDate);

        if (filteredGames.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">該日期目前沒有賽事。</div>';
            return;
        }

        filteredGames.forEach((game, index) => {
            const scoreDisplay = (game.team1Score && game.team2Score) 
                ? `<div class="score-text">${game.team1Score} - ${game.team2Score}</div>` 
                : `<div class="vs-text">VS</div>`;

            const hasMedia = game.photoLink || game.q1Link || game.q2Link || game.q3Link || game.q4Link;
            let mediaHtml = '';
            let toggleBtnHtml = '';

            if (hasMedia) {
                toggleBtnHtml = `<button class="toggle-details-btn" onclick="toggleDetails('media-section-${index}')">Game Details (比賽詳情) 🔽</button>`;
                
                mediaHtml += `<div id="media-section-${index}" class="media-links">`;
                if (game.photoLink) mediaHtml += `<a href="${game.photoLink}" target="_blank" class="media-btn photo">📷 Photos</a>`;
                if (game.q1Link) mediaHtml += `<a href="${game.q1Link}" target="_blank" class="media-btn video">🎥 Q1</a>`;
                if (game.q2Link) mediaHtml += `<a href="${game.q2Link}" target="_blank" class="media-btn video">🎥 Q2</a>`;
                if (game.q3Link) mediaHtml += `<a href="${game.q3Link}" target="_blank" class="media-btn video">🎥 Q3</a>`;
                if (game.q4Link) mediaHtml += `<a href="${game.q4Link}" target="_blank" class="media-btn video">🎥 Q4</a>`;
                mediaHtml += `</div>`;
            }

            const card = document.createElement('div');
            card.className = 'match-card';
            card.innerHTML = `
                <div class="match-info">
                    📅 ${game.date} &nbsp;|&nbsp; ⏰ ${game.time} &nbsp;|&nbsp; 📍 ${game.location}
                </div>
                <div class="scoreboard">
                    <div class="team">
                        <img src="${game.team1Logo}" alt="${game.team1Name}" class="team-logo" onerror="this.src='https://via.placeholder.com/70/334155/FFFFFF?text=T1'">
                        <div class="team-name">${game.team1Name}</div>
                    </div>
                    
                    <div class="score-box">
                        ${scoreDisplay}
                    </div>
                    
                    <div class="team">
                        <img src="${game.team2Logo}" alt="${game.team2Name}" class="team-logo" onerror="this.src='https://via.placeholder.com/70/334155/FFFFFF?text=T2'">
                        <div class="team-name">${game.team2Name}</div>
                    </div>
                </div>
                ${toggleBtnHtml}
                ${mediaHtml}
            `;
            container.appendChild(card);
        });
    }

    function toggleDetails(sectionId) {
        document.getElementById(sectionId).classList.toggle('show');
    }
</script>

</body>
</html>
