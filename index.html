<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>籃球聯賽賽程表 - Pro League (Firebase即時版)</title>
    
    <!-- 引入 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        /* NBA 風格深色主題 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0f172a; color: #f8fafc; padding: 20px 15px; margin: 0; 
        }
        .container { max-width: 650px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.8em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* 橫向日期篩選器與月份選單 */
        .date-picker-wrapper { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 25px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; }
        .month-indicator { position: relative; min-width: 110px; display: flex; align-items: center; }
        #month-select { background: transparent; color: #f8fafc; border: none; font-size: 1.1em; font-weight: 800; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; padding-right: 20px; width: 100%; }
        #month-select option { background-color: #1e293b; color: #f8fafc; }
        .month-indicator::after { content: '▾'; position: absolute; right: 0; top: 50%; transform: translateY(-50%); pointer-events: none; color: #f8fafc; font-size: 1em; }

        .dates-carousel { display: flex; align-items: center; flex-grow: 1; overflow: hidden; position: relative; margin-left: 10px; border-left: 1px solid #334155; padding-left: 10px; }
        .nav-arrow { background: transparent; border: none; color: #94a3b8; font-size: 1.2em; cursor: pointer; padding: 0 5px; transition: color 0.2s; }
        .nav-arrow:hover { color: #f8fafc; }
        
        .dates-list { display: flex; overflow-x: auto; scrollbar-width: none; scroll-behavior: smooth; gap: 5px; flex-grow: 1; }
        .dates-list::-webkit-scrollbar { display: none; }
        
        .date-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 8px 12px; color: #94a3b8; border-bottom: 3px solid transparent; min-width: 40px; transition: all 0.2s; }
        .date-item:hover { color: #e2e8f0; }
        .date-item.active { color: #f8fafc; border-bottom: 3px solid #f8fafc; }
        .date-item .day-name { font-size: 0.85em; font-weight: 600; margin-bottom: 4px; }
        .date-item .day-number { font-size: 1.4em; font-weight: 800; }

        /* 賽程卡片設計 */
        .match-card { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); padding: 20px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 8px 16px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .match-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.6); border-color: #475569; }
        .match-info { text-align: center; color: #94a3b8; font-size: 0.85em; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        /* 比分與球隊排版 */
        .scoreboard { display: flex; justify-content: space-between; align-items: center; }
        .team { display: flex; flex-direction: column; align-items: center; width: 30%; }
        .team-logo { width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .team-name { font-weight: 700; color: #f8fafc; font-size: 1em; text-align: center; }
        
        /* 勝敗字體高亮樣式 */
        .score-box { width: 40%; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .score-text { display: flex; justify-content: center; align-items: center; gap: 12px; font-size: 2.8em; font-family: Impact, "Arial Black", sans-serif; letter-spacing: 1px; }
        .score-text .winner { color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .score-text .loser { color: #64748b; font-family: -apple-system, sans-serif; font-weight: 700; opacity: 0.8; text-shadow: none; }
        .score-text .divider { color: #334155; font-size: 0.5em; font-family: -apple-system, sans-serif; letter-spacing: 0; }
        .vs-text { font-size: 1.2em; font-weight: 700; color: #64748b; }

        /* 彈出視窗 (Modal) 設計 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.show { display: flex; opacity: 1; animation: fadeIn 0.2s ease-out forwards; }
        .modal-content { background: #1e293b; width: 100%; max-width: 500px; border-radius: 16px; border: 1px solid #334155; padding: 30px 20px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8); transform: scale(0.95); transition: transform 0.2s ease; }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .close-btn { position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: #94a3b8; font-size: 1.5em; cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: #f8fafc; }
        
        /* 媒體按鈕 */
        .media-links { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .media-links-title { text-align: center; color: #94a3b8; font-size: 0.9em; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .media-btn { display: flex; justify-content: center; align-items: center; gap: 8px; background-color: #334155; color: #f8fafc; text-decoration: none; padding: 12px 16px; border-radius: 8px; font-size: 1em; font-weight: 700; transition: all 0.2s; border: 1px solid #475569; }
        .media-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .media-btn.photo { background-color: #0369a1; border-color: #0284c7; }
        .media-btn.video { background-color: #be123c; border-color: #e11d48; }
        .no-media-text { text-align: center; color: #64748b; font-style: italic; margin-top: 15px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🏀 聯賽賽程與賽事回放</h1>
    
    <div class="date-picker-wrapper">
        <div class="month-indicator">
            <select id="month-select" onchange="handleMonthChange(this.value)">
            </select>
        </div>
        <div class="dates-carousel">
            <button class="nav-arrow" onclick="scrollDates(-1)">&#10094;</button>
            <div class="dates-list" id="dates-list-container">
            </div>
            <button class="nav-arrow" onclick="scrollDates(1)">&#10095;</button>
        </div>
    </div>
    
    <div id="schedule-container">資料載入中...</div>
</div>

<div id="game-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeModal(true)">&times;</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    // 你的 Firebase 金鑰
    const firebaseConfig = {
        apiKey: "AIzaSyA0OQj9FGi21FSQIMI_dHOeg8Tl01N0b-k",
        authDomain: "basketball-league-fd0a5.firebaseapp.com",
        projectId: "basketball-league-fd0a5",
        storageBucket: "basketball-league-fd0a5.firebasestorage.app",
        messagingSenderId: "479284011594",
        appId: "1:479284011594:web:91a544adf25c948789bcb3",
        measurementId: "G-W0EY8CYVY2"
    };

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allGames = [];
    let uniqueMonths = {}; 
    let currentSelectedMonth = 'all'; 
    let currentSelectedDate = 'all';

    const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

    // 🚀 即時監聽 Firestore (對應你提供的 collection 名稱 'game' 與自訂 Field 名稱)
    db.collection("game").onSnapshot((snapshot) => {
        allGames = []; 
        uniqueMonths = {}; 

        snapshot.forEach((doc) => {
            const data = doc.data();
            
            // 完美對應你的 Firestore 欄位名稱
            const gameData = {
                id: doc.id,
                date: data.date || '',
                time: data.time || '',
                location: data.location || '', // 如果你後台沒有建 location 欄位，這會自動為空
                team1Name: data.HomeTeamName || '',
                team1Logo: data.HomeTeamLogo || 'https://via.placeholder.com/70/334155/FFFFFF?text=Home',
                team1Score: data.HomeTeamScore || '',
                team2Name: data.AwayTeamName || '',
                team2Logo: data.AwayTeamLogo || 'https://via.placeholder.com/70/334155/FFFFFF?text=Away',
                team2Score: data.AwayTeamScore || '',
                photoLink: data.photoLink || '',
                q1Link: data.Q1Link || '',
                q2Link: data.Q2Link || '',
                q3Link: data.Q3Link || '',
                q4Link: data.Q4Link || ''
            };
            
            if(gameData.date) {
                allGames.push(gameData);
                
                const d = new Date(gameData.date);
                if (!isNaN(d)) {
                    const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    const monthLabel = `${monthNames[d.getMonth()]} ${d.getFullYear()}`;
                    uniqueMonths[monthKey] = monthLabel;
                }
            }
        });

        allGames.sort((a, b) => new Date(a.date) - new Date(b.date));

        if (allGames.length === 0) {
            document.getElementById('schedule-container').innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">目前資料庫尚無賽程資料，請至 Firebase 後台新增。</div>';
            return;
        }

        buildMonthSelector();
        buildDateCarousel(currentSelectedMonth);
        renderGames(currentSelectedMonth, currentSelectedDate);
        
    }, (error) => {
        console.error("資料庫讀取失敗：", error);
        document.getElementById('schedule-container').innerHTML = '<div style="text-align:center; color:#ef4444; padding:20px;">載入失敗，請確認 Firebase 資料庫的權限設定 (Rules) 是否允許讀取。</div>';
    });

    function buildMonthSelector() {
        const select = document.getElementById('month-select');
        select.innerHTML = '<option value="all">All Months</option>'; 
        Object.keys(uniqueMonths).sort().forEach(key => {
            const option = document.createElement('option');
            option.value = key;
            option.textContent = uniqueMonths[key];
            if (key === currentSelectedMonth) option.selected = true;
            select.appendChild(option);
        });
    }

    function handleMonthChange(monthKey) {
        currentSelectedMonth = monthKey;
        currentSelectedDate = 'all'; 
        buildDateCarousel(monthKey);
        renderGames(monthKey, 'all');
    }

    function buildDateCarousel(monthKey) {
        const container = document.getElementById('dates-list-container');
        container.innerHTML = ''; 

        let filteredDates = [...new Set(allGames.map(g => g.date))].sort();
        if (monthKey !== 'all') {
            filteredDates = filteredDates.filter(dateStr => {
                const d = new Date(dateStr);
                if (isNaN(d)) return false;
                const mk = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                return mk === monthKey;
            });
        }

        filteredDates.forEach(dateStr => {
            const d = new Date(dateStr);
            let dayName = 'Day', dayNum = '--';
            if (!isNaN(d)) {
                dayName = daysOfWeek[d.getDay()];
                dayNum = d.getDate();
            }

            const div = document.createElement('div');
            div.className = 'date-item';
            if (dateStr === currentSelectedDate) div.classList.add('active');
            div.dataset.date = dateStr; 
            div.onclick = () => filterByDate(dateStr);
            div.innerHTML = `
                <div class="day-name">${dayName}</div>
                <div class="day-number">${dayNum}</div>
            `;
            container.appendChild(div);
        });
    }

    function scrollDates(direction) {
        const list = document.getElementById('dates-list-container');
        list.scrollBy({ left: direction * 150, behavior: 'smooth' });
    }

    function filterByDate(clickedDate) {
        if (currentSelectedDate === clickedDate) {
            currentSelectedDate = 'all'; 
        } else {
            currentSelectedDate = clickedDate;
        }

        document.querySelectorAll('.date-item').forEach(el => {
            el.classList.remove('active');
            if (el.dataset.date === currentSelectedDate) el.classList.add('active');
        });

        renderGames(currentSelectedMonth, currentSelectedDate);
    }

    function getScoreDisplayHtml(team1Score, team2Score, isModal = false) {
        if (!team1Score || !team2Score) {
            return `<div class="vs-text" style="${isModal ? 'font-size: 2em;' : ''}">VS</div>`;
        }

        const s1 = parseInt(team1Score, 10);
        const s2 = parseInt(team2Score, 10);
        
        let t1Class = 'winner';
        let t2Class = 'winner';
        
        if (s1 > s2) {
            t2Class = 'loser';
        } else if (s2 > s1) {
            t1Class = 'loser';
        }

        const fontSize = isModal ? 'font-size: 3.5em;' : '';
        
        return `
            <div class="score-text" style="${fontSize}">
                <span class="${t1Class}">${team1Score}</span>
                <span class="divider">-</span>
                <span class="${t2Class}">${team2Score}</span>
            </div>
        `;
    }

    function renderGames(monthKey, dateKey) {
        const container = document.getElementById('schedule-container');
        container.innerHTML = ''; 

        let filteredGames = allGames;
        
        if (monthKey !== 'all') {
            filteredGames = filteredGames.filter(game => {
                const d = new Date(game.date);
                if (isNaN(d)) return false;
                const mk = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                return mk === monthKey;
            });
        }
        
        if (dateKey !== 'all') {
            filteredGames = filteredGames.filter(game => game.date === dateKey);
        }

        if (filteredGames.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">該時段目前沒有賽事。</div>';
            return;
        }

        filteredGames.forEach(game => {
            const scoreDisplay = getScoreDisplayHtml(game.team1Score, game.team2Score);

            const card = document.createElement('div');
            card.className = 'match-card';
            card.onclick = () => openGameDetails(game.id); 
            card.innerHTML = `
                <div class="match-info">
                    📅 ${game.date} &nbsp;|&nbsp; ⏰ ${game.time} &nbsp;|&nbsp; 📍 ${game.location}
                </div>
                <div class="scoreboard">
                    <div class="team">
                        <img src="${game.team1Logo}" alt="${game.team1Name}" class="team-logo" onerror="this.src='https://via.placeholder.com/70/334155/FFFFFF?text=Home'">
                        <div class="team-name">${game.team1Name}</div>
                    </div>
                    
                    <div class="score-box">
                        ${scoreDisplay}
                        <div style="font-size: 0.75em; color: #3b82f6; margin-top: 10px; font-weight: 600;">點擊查看詳情</div>
                    </div>
                    
                    <div class="team">
                        <img src="${game.team2Logo}" alt="${game.team2Name}" class="team-logo" onerror="this.src='https://via.placeholder.com/70/334155/FFFFFF?text=Away'">
                        <div class="team-name">${game.team2Name}</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function openGameDetails(gameId) {
        const game = allGames.find(g => g.id === gameId);
        if (!game) return;

        const modal = document.getElementById('game-modal');
        const modalBody = document.getElementById('modal-body');
        
        const scoreDisplay = getScoreDisplayHtml(game.team1Score, game.team2Score, true);
        const hasMedia = game.photoLink || game.q1Link || game.q2Link || game.q3Link || game.q4Link;
        let mediaHtml = '';

        if (hasMedia) {
            mediaHtml += `<div class="media-links"><div class="media-links-title">Game Highlights (賽事重播)</div>`;
            if (game.photoLink) mediaHtml += `<a href="${game.photoLink}" target="_blank" class="media-btn photo">📷 查看比賽相簿 (Photos)</a>`;
            if (game.q1Link) mediaHtml += `<a href="${game.q1Link}" target="_blank" class="media-btn video">🎥 第 1 節 (Q1 Replay)</a>`;
            if (game.q2Link) mediaHtml += `<a href="${game.q2Link}" target="_blank" class="media-btn video">🎥 第 2 節 (Q2 Replay)</a>`;
            if (game.q3Link) mediaHtml += `<a href="${game.q3Link}" target="_blank" class="media-btn video">🎥 第 3 節 (Q3 Replay)</a>`;
            if (game.q4Link) mediaHtml += `<a href="${game.q4Link}" target="_blank" class="media-btn video">🎥 第 4 節 (Q4 Replay)</a>`;
            mediaHtml += `</div>`;
        } else {
            mediaHtml = `<div class="no-media-text">這場比賽尚未上傳照片或影片紀錄。</div>`;
        }

        modalBody.innerHTML = `
            <div class="match-info" style="border:none; padding-top: 10px;">
                📅 ${game.date} &nbsp;|&nbsp; ⏰ ${game.time} <br> 📍 ${game.location}
            </div>
            <div class="scoreboard" style="margin-bottom: 20px;">
                <div class="team" style="width: 25%;">
                    <img src="${game.team1Logo}" class="team-logo" style="width:80px; height:80px;" onerror="this.src='https://via.placeholder.com/80/334155/FFFFFF?text=Home'">
                    <div class="team-name" style="font-size: 1.2em;">${game.team1Name}</div>
                </div>
                <div class="score-box" style="width: 50%;">
                    ${scoreDisplay}
                </div>
                <div class="team" style="width: 25%;">
                    <img src="${game.team2Logo}" class="team-logo" style="width:80px; height:80px;" onerror="this.src='https://via.placeholder.com/80/334155/FFFFFF?text=Away'">
                    <div class="team-name" style="font-size: 1.2em;">${game.team2Name}</div>
                </div>
            </div>
            ${mediaHtml}
        `;

        modal.classList.add('show');
        document.body.style.overflow = 'hidden'; 
    }

    function closeModal(isClickOrEvent) {
        if (isClickOrEvent) {
            document.getElementById('game-modal').classList.remove('show');
            document.body.style.overflow = 'auto'; 
        }
    }
</script>

</body>
</html>
