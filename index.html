<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>籃球聯賽賽程表 - Pro League</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px 15px; margin: 0; }
        .container { max-width: 650px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.8em; font-weight: 800; margin-bottom: 25px; }
        
        .match-card { background: #1e293b; padding: 20px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .match-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.6); }
        .match-info { text-align: center; color: #94a3b8; font-size: 0.85em; font-weight: 600; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .scoreboard { display: flex; justify-content: space-between; align-items: center; }
        .team { display: flex; flex-direction: column; align-items: center; width: 30%; }
        .team-logo { width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px; }
        .team-name { font-weight: 700; color: #f8fafc; font-size: 1em; text-align: center; }
        
        .score-box { width: 40%; text-align: center; }
        .score-text { font-size: 2.8em; font-family: Impact, sans-serif; }
        .score-text .winner { color: #ffffff; }
        .score-text .loser { color: #64748b; font-weight: 700; font-family: sans-serif; }
        
        /* 彈出視窗 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: #1e293b; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; border-radius: 12px; border: 1px solid #334155; padding: 25px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: #94a3b8; font-size: 1.5em; cursor: pointer; }
        
        /* 表格外層加入橫向滾動條 */
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #334155; }
        .q-table, .player-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.85em; white-space: nowrap; }
        .q-table th, .player-table th { background-color: #0f172a; color: #94a3b8; padding: 12px 10px; font-weight: 600; border-bottom: 1px solid #334155; position: sticky; top: 0; }
        .q-table td, .player-table td { padding: 10px; border-bottom: 1px solid #334155; color: #f8fafc; }
        .player-table tr:hover { background-color: #334155; }
        
        .section-title { margin-top: 25px; font-size: 1.1em; font-weight: bold; border-left: 4px solid #3b82f6; padding-left: 10px; }
        .loading-text { text-align: center; color: #3b82f6; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏀 聯賽賽程表</h1>
    <div id="schedule-container">資料載入中...</div>
</div>

<div id="game-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeModal(true)">&times;</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA0OQj9FGi21FSQIMI_dHOeg8Tl01N0b-k",
        authDomain: "basketball-league-fd0a5.firebaseapp.com",
        projectId: "basketball-league-fd0a5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let allGames = [];

    // 首頁輕量載入 (加入錯誤處理，如果被阻擋會顯示錯誤訊息)
    db.collection("game").onSnapshot((snapshot) => {
        allGames = []; 
        snapshot.forEach((doc) => {
            const d = doc.data();
            if(d.date) allGames.push({ id: doc.id, ...d });
        });
        
        allGames.sort((a, b) => new Date(a.date) - new Date(b.date));
        
        if(allGames.length === 0) {
            document.getElementById('schedule-container').innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">目前尚無賽程資料，或請點擊 Google 表格的同步按鈕。</div>';
        } else {
            renderGames();
        }
    }, (error) => {
        console.error("Firebase 讀取錯誤:", error);
        document.getElementById('schedule-container').innerHTML = '<div style="text-align:center; color:#ef4444; padding:20px;">資料庫連線失敗，請檢查 Firebase Rules 設定是否為 allow read, write: if true;</div>';
    });

    function getScoreHtml(s1, s2) {
        if (!s1 || !s2) return `<div style="font-size:1.5em; color:#64748b; font-weight:bold;">VS</div>`;
        let t1 = parseInt(s1)>parseInt(s2) ? 'winner':'loser';
        let t2 = parseInt(s2)>parseInt(s1) ? 'winner':'loser';
        return `<div class="score-text"><span class="${t1}">${s1}</span> <span style="font-size:0.5em; color:#334155;">-</span> <span class="${t2}">${s2}</span></div>`;
    }

    function renderGames() {
        const container = document.getElementById('schedule-container');
        container.innerHTML = ''; 
        
        allGames.forEach(game => {
            const card = document.createElement('div');
            card.className = 'match-card';
            card.onclick = () => openGameDetails(game.id, game); 
            card.innerHTML = `
                <div class="match-info">📅 ${game.date} | ⏰ ${game.time} | 📍 ${game.location}</div>
                <div class="scoreboard">
                    <div class="team">
                        <img src="${game.HomeTeamLogo}" class="team-logo" onerror="this.src='https://via.placeholder.com/70/334155/FFFFFF?text=Home'">
                        <div class="team-name">${game.HomeTeamName}</div>
                    </div>
                    <div class="score-box">
                        ${getScoreHtml(game.HomeTeamScore, game.AwayTeamScore)}
                        <div style="font-size:0.75em; color:#3b82f6; margin-top:5px;">📊 點擊查看進階數據</div>
                    </div>
                    <div class="team">
                        <img src="${game.AwayTeamLogo}" class="team-logo" onerror="this.src='https://via.placeholder.com/70/334155/FFFFFF?text=Away'">
                        <div class="team-name">${game.AwayTeamName}</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 延遲載入進階數據
    function openGameDetails(gameId, basicData) {
        const modal = document.getElementById('game-modal');
        const modalBody = document.getElementById('modal-body');
        modal.classList.add('show');
        document.body.style.overflow = 'hidden'; 
        
        modalBody.innerHTML = `
            <div class="scoreboard" style="margin-bottom:10px;">
                <div class="team"><img src="${basicData.HomeTeamLogo}" class="team-logo" onerror="this.src='https://via.placeholder.com/70/334155/FFFFFF?text=Home'"><div class="team-name">${basicData.HomeTeamName}</div></div>
                <div class="score-box">${getScoreHtml(basicData.HomeTeamScore, basicData.AwayTeamScore)}</div>
                <div class="team"><img src="${basicData.AwayTeamLogo}" class="team-logo" onerror="this.src='https://via.placeholder.com/70/334155/FFFFFF?text=Away'"><div class="team-name">${basicData.AwayTeamName}</div></div>
            </div>
            <div id="advanced-stats" class="loading-text">🔄 正在抓取超完整進階數據...</div>
        `;

        db.collection("boxScore").doc(gameId).get().then((doc) => {
            const stats = document.getElementById('advanced-stats');
            if (!doc.exists) {
                stats.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">目前尚無此場比賽的進階數據。</div>';
                return;
            }

            const adv = doc.data();
            let html = '';

            // 各節比分表
            if(adv.HomeQ1 || adv.AwayQ1) {
                html += `
                <div class="section-title">各節比分 (Box Score)</div>
                <div class="table-responsive">
                    <table class="q-table">
                        <tr><th>球隊</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>總分</th></tr>
                        <tr>
                            <td style="font-weight:bold;">${basicData.HomeTeamName}</td>
                            <td>${adv.HomeQ1||'-'}</td><td>${adv.HomeQ2||'-'}</td><td>${adv.HomeQ3||'-'}</td><td>${adv.HomeQ4||'-'}</td>
                            <td style="font-weight:bold; color:#3b82f6;">${basicData.HomeTeamScore||'-'}</td>
                        </tr>
                        <tr>
                            <td style="font-weight:bold;">${basicData.AwayTeamName}</td>
                            <td>${adv.AwayQ1||'-'}</td><td>${adv.AwayQ2||'-'}</td><td>${adv.AwayQ3||'-'}</td><td>${adv.AwayQ4||'-'}</td>
                            <td style="font-weight:bold; color:#3b82f6;">${basicData.AwayTeamScore||'-'}</td>
                        </tr>
                    </table>
                </div>`;
            }

            // 完整球員數據表
            if(adv.players && adv.players !== "[]") {
                const players = JSON.parse(adv.players);
                html += `<div class="section-title">球員數據 (Player Stats)</div>
                         <div class="table-responsive">
                            <table class="player-table">
                                <tr>
                                    <th>球隊</th><th>#</th><th>姓名</th><th>MIN</th><th>PTS</th>
                                    <th>FGM</th><th>FGA</th><th>FG%</th><th>3PM</th><th>3PA</th><th>3P%</th>
                                    <th>2PM</th><th>2PA</th><th>2P%</th><th>FTM</th><th>FTA</th><th>FT%</th>
                                    <th>OREB</th><th>DREB</th><th>REB</th><th>AST</th><th>TOV</th><th>STL</th>
                                    <th>BLK</th><th>EFF</th><th>+/-</th>
                                </tr>`;
                
                players.forEach(p => {
                    // 修正：使用 p['屬性名稱'] 來讀取數字開頭的資料
                    html += `<tr>
                        <td>${p.Team||'-'}</td><td>${p.Number||'-'}</td><td style="font-weight:bold;">${p.Name||'-'}</td>
                        <td>${p.MIN||'-'}</td><td style="font-weight:bold; color:#3b82f6;">${p.PTS||'-'}</td>
                        <td>${p.FGM||'-'}</td><td>${p.FGA||'-'}</td><td>${p.FG_pct||'-'}</td>
                        <td>${p['3PM']||'-'}</td><td>${p['3PA']||'-'}</td><td>${p['3P_pct']||'-'}</td>
                        <td>${p['2PM']||'-'}</td><td>${p['2PA']||'-'}</td><td>${p['2P_pct']||'-'}</td>
                        <td>${p.FTM||'-'}</td><td>${p.FTA||'-'}</td><td>${p.FT_pct||'-'}</td>
                        <td>${p.OREB||'-'}</td><td>${p.DREB||'-'}</td><td>${p.REB||'-'}</td>
                        <td>${p.AST||'-'}</td><td>${p.TOV||'-'}</td><td>${p.STL||'-'}</td>
                        <td>${p.BLK||'-'}</td><td>${p.EFF||'-'}</td><td>${p.PlusMinus||'-'}</td>
                    </tr>`;
                });
                html += `</table></div>`;
            } else {
                html += `<div style="text-align:center; color:#94a3b8; margin-top:20px;">尚未登錄球員數據。</div>`;
            }

            stats.innerHTML = html;
        }).catch(err => {
            document.getElementById('advanced-stats').innerHTML = '<div style="text-align:center; color:#ef4444;">載入失敗，請稍後再試。</div>';
        });
    }

    function closeModal(isClick) {
        if (isClick) {
            document.getElementById('game-modal').classList.remove('show');
            document.body.style.overflow = 'auto'; 
        }
    }
</script>
</body>
</html>
