<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>籃球聯賽賽程表 - Pro League</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Reddit+Sans+Condensed:wght@200..900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: 'Reddit Sans Condensed', "Arial Narrow", sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px 15px; margin: 0; }
        .container { max-width: 650px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.8em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .date-picker-wrapper { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 25px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; }
        .month-indicator { position: relative; min-width: 110px; display: flex; align-items: center; }
        #month-select { background: transparent; color: #f8fafc; border: none; font-size: 1.1em; font-weight: 800; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; padding-right: 20px; width: 100%; }
        #month-select option { background-color: #1e293b; color: #f8fafc; }
        .month-indicator::after { content: '▾'; position: absolute; right: 0; top: 50%; transform: translateY(-50%); pointer-events: none; color: #f8fafc; font-size: 1em; }
        .dates-carousel { display: flex; align-items: center; flex-grow: 1; overflow: hidden; position: relative; margin-left: 10px; border-left: 1px solid #334155; padding-left: 10px; }
        .nav-arrow { background: transparent; border: none; color: #94a3b8; font-size: 1.2em; cursor: pointer; padding: 0 5px; transition: color 0.2s; }
        .nav-arrow:hover { color: #f8fafc; }
        .dates-list { display: flex; overflow-x: auto; scrollbar-width: none; scroll-behavior: smooth; gap: 5px; flex-grow: 1; }
        .dates-list::-webkit-scrollbar { display: none; }
        .date-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 8px 12px; color: #94a3b8; border-bottom: 3px solid transparent; min-width: 45px; transition: all 0.2s; border-radius: 8px; }
        .date-item:hover { color: #e2e8f0; background: rgba(255,255,255,0.05); }
        .date-item.active { color: #f8fafc; background: #334155; }
        .date-item .day-name { font-size: 0.85em; font-weight: 600; margin-bottom: 4px; text-transform: uppercase; }
        .date-item .day-number { font-size: 1.3em; font-weight: 800; }

        .match-card { background: #1e293b; padding: 18px 20px 12px 20px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 20px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .match-card:hover { transform: translateY(-4px); box-shadow: 0 14px 28px rgba(0,0,0,0.6); border-color: #475569; }
        
        .match-info { text-align: center; color: #94a3b8; font-size: 0.9em; font-weight: 700; margin-bottom: 20px; letter-spacing: 0.5px; }
        
        /* 🔥 佈局修復：改用 Flex 彈性分配，避免手機版撐破 */
        .scoreboard { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding: 0 5px; }
        .team { display: flex; flex-direction: column; align-items: center; flex: 1; width: 0; }
        .team-logo { width: 55px; height: 55px; min-width: 55px; min-height: 55px; flex-shrink: 0; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .team-name { font-weight: 700; font-size: 1.05em; text-align: center; color: #f8fafc; }
        
        /* 比分區塊依照內容自動撐開 */
        .score-box { display: flex; justify-content: center; align-items: center; flex: 0 0 auto; margin: 0 10px; }
        
        .score-grid { display: grid; grid-template-columns: 1fr 20px 55px 20px 1fr; align-items: center; justify-items: center; width: 100%; gap: 4px; }
        .score-num { font-size: 3em; font-weight: 300; letter-spacing: -1px; line-height: 1; }
        .score-num.home-score { justify-self: end; }
        .score-num.away-score { justify-self: start; }
        .score-num.winner { color: #f8fafc; }
        .score-num.loser { color: #64748b; }
        
        .arrow { font-size: 1em; font-weight: 800; color: #f8fafc; }
        .arrow.invisible { visibility: hidden; } 
        .final-text { font-size: 0.9em; font-weight: 800; color: #94a3b8; letter-spacing: 0.5px; }
        .vs-text { font-size: 1.2em; font-weight: 800; color: #64748b; letter-spacing: 1px; grid-column: 1 / -1; }

        .card-footer { border-top: 1px solid #334155; margin-top: 15px; padding-top: 12px; text-align: center; }
        .details-btn { display: inline-flex; align-items: center; font-size: 0.9em; font-weight: 700; color: #94a3b8; transition: color 0.2s; }
        .match-card:hover .details-btn { color: #f8fafc; }
        .details-btn::before { content: '▶'; color: #fbbf24; margin-right: 6px; font-size: 1.1em; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px); }
        .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease-out forwards; }
        .modal-content { background: #0f172a; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; border-radius: 16px; border: 1px solid #334155; padding: 25px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .close-btn { position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: #94a3b8; font-size: 1.5em; cursor: pointer; transition: color 0.2s; z-index: 10; }
        .close-btn:hover { color: #f8fafc; }
        
        .modal-header-card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        .media-links { margin-top: 10px; margin-bottom: 25px; display: flex; flex-direction: column; gap: 10px; }
        .media-btn { display: flex; justify-content: center; align-items: center; gap: 8px; background-color: #334155; color: #f8fafc; text-decoration: none; padding: 12px 16px; border-radius: 8px; font-size: 1em; font-weight: 700; transition: all 0.2s; border: 1px solid #475569; }
        .media-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .media-btn.photo { background-color: #0369a1; border-color: #0284c7; }
        .media-btn.video { background-color: #be123c; border-color: #e11d48; }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 25px; }
        .q-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.9em; white-space: nowrap; }
        .q-table th { background-color: #0f172a; color: #94a3b8; padding: 12px 10px; font-weight: 600; border-bottom: 1px solid #334155; position: sticky; top: 0; }
        .q-table td { padding: 10px; border-bottom: 1px solid #334155; color: #f8fafc; }
        
        .section-title { margin-top: 25px; font-size: 1.1em; font-weight: bold; border-left: 4px solid #3b82f6; padding-left: 10px; }
        .loading-text { text-align: center; color: #3b82f6; font-weight: bold; padding: 20px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 📱 🔥 手機版專屬響應式設計 (針對小於 480px 的螢幕) */
        @media (max-width: 480px) {
            .match-card { padding: 15px 10px 12px 10px; }
            .team-logo { width: 40px; height: 40px; min-width: 40px; min-height: 40px; flex-shrink: 0; object-fit: contain; margin-bottom: 5px; }
            .team-name { font-size: 0.85em; }
            
            /* 分數與間距等比例縮小 */
            .score-box { margin: 0 5px; }
            .score-grid { grid-template-columns: 1fr 12px 38px 12px 1fr; gap: 2px; }
            .score-num { font-size: 2.2em; }
            .final-text { font-size: 0.75em; }
            .arrow { font-size: 0.8em; }
            .vs-text { font-size: 1em; }
            
            /* 日期選擇器縮小 */
            .month-indicator { min-width: 90px; }
            #month-select { font-size: 0.95em; padding-right: 15px; }
            .date-item { min-width: 38px; padding: 6px 8px; }
            .date-item .day-number { font-size: 1.1em; }
            
            /* 彈出視窗版面微調 */
            .modal-content { padding: 15px; }
            .modal-header-card { padding: 15px 10px; }
            .q-table th, .q-table td { padding: 8px 6px; font-size: 0.85em; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏀 聯賽賽程表</h1>
    
    <div class="date-picker-wrapper">
        <div class="month-indicator">
            <select id="month-select" onchange="handleMonthChange(this.value)"></select>
        </div>
        <div class="dates-carousel">
            <button class="nav-arrow" onclick="scrollDates(-1)">&#10094;</button>
            <div class="dates-list" id="dates-list-container"></div>
            <button class="nav-arrow" onclick="scrollDates(1)">&#10095;</button>
        </div>
    </div>

    <div id="schedule-container">資料載入中...</div>
</div>

<div id="game-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeModal(true)">&times;</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA0OQj9FGi21FSQIMI_dHOeg8Tl01N0b-k",
        authDomain: "basketball-league-fd0a5.firebaseapp.com",
        projectId: "basketball-league-fd0a5"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let allGames = [];
    let uniqueMonths = {}; 
    let currentSelectedMonth = 'all'; 
    let currentSelectedDate = 'all';
    let isFirstLoad = true;

    const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

    const getTodayDateObj = () => {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        return {
            dateStr: `${y}/${m}/${d}`,
            monthStr: `${y}-${m}`,
            label: `${monthNames[now.getMonth()]} ${y}`
        };
    };

    db.collection("game").onSnapshot((snapshot) => {
        allGames = []; 
        uniqueMonths = {};

        snapshot.forEach((doc) => {
            const d = doc.data();
            if(d.date) {
                allGames.push({ id: doc.id, ...d });
                const dateObj = new Date(d.date);
                if (!isNaN(dateObj)) {
                    const monthKey = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
                    const monthLabel = `${monthNames[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
                    uniqueMonths[monthKey] = monthLabel;
                }
            }
        });
        
        allGames.sort((a, b) => new Date(a.date) - new Date(b.date));
        
        if (isFirstLoad) {
            const todayObj = getTodayDateObj();
            currentSelectedMonth = todayObj.monthStr;
            currentSelectedDate = todayObj.dateStr;
            if (!uniqueMonths[currentSelectedMonth]) {
                uniqueMonths[currentSelectedMonth] = todayObj.label;
            }
            isFirstLoad = false;
        }

        buildMonthSelector();
        buildDateCarousel(currentSelectedMonth);
        renderGames(currentSelectedMonth, currentSelectedDate);

        setTimeout(() => {
            const activeItem = document.querySelector('.date-item.active');
            if(activeItem) {
                activeItem.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
        }, 150);

    }, (error) => {
        document.getElementById('schedule-container').innerHTML = '<div style="text-align:center; color:#ef4444; padding:20px;">資料庫連線失敗，請檢查權限。</div>';
    });

    function buildMonthSelector() {
        const select = document.getElementById('month-select');
        select.innerHTML = '<option value="all">All Months</option>'; 
        Object.keys(uniqueMonths).sort().forEach(key => {
            const option = document.createElement('option');
            option.value = key;
            option.textContent = uniqueMonths[key];
            if (key === currentSelectedMonth) option.selected = true;
            select.appendChild(option);
        });
    }

    function handleMonthChange(monthKey) {
        currentSelectedMonth = monthKey;
        currentSelectedDate = 'all'; 
        buildDateCarousel(monthKey);
        renderGames(monthKey, 'all');
    }

    function buildDateCarousel(monthKey) {
        const container = document.getElementById('dates-list-container');
        container.innerHTML = ''; 

        let filteredDates = [...new Set(allGames.map(g => g.date))].sort();
        
        if (monthKey !== 'all') {
            const todayObj = getTodayDateObj();
            if (monthKey === todayObj.monthStr && !filteredDates.includes(todayObj.dateStr)) {
                filteredDates.push(todayObj.dateStr);
                filteredDates.sort();
            }

            filteredDates = filteredDates.filter(dateStr => {
                const dObj = new Date(dateStr);
                if (isNaN(dObj)) return false;
                return `${dObj.getFullYear()}-${String(dObj.getMonth() + 1).padStart(2, '0')}` === monthKey;
            });
        }

        filteredDates.forEach(dateStr => {
            const d = new Date(dateStr);
            let dayName = 'Day', dayNum = '--';
            if (!isNaN(d)) {
                dayName = daysOfWeek[d.getDay()];
                dayNum = d.getDate();
            }

            const div = document.createElement('div');
            div.className = 'date-item';
            if (dateStr === currentSelectedDate) div.classList.add('active');
            div.dataset.date = dateStr; 
            div.onclick = () => filterByDate(dateStr);
            div.innerHTML = `<div class="day-name">${dayName}</div><div class="day-number">${dayNum}</div>`;
            container.appendChild(div);
        });
    }

    function scrollDates(direction) {
        document.getElementById('dates-list-container').scrollBy({ left: direction * 150, behavior: 'smooth' });
    }

    function filterByDate(clickedDate) {
        currentSelectedDate = (currentSelectedDate === clickedDate) ? 'all' : clickedDate;
        document.querySelectorAll('.date-item').forEach(el => {
            el.classList.remove('active');
            if (el.dataset.date === currentSelectedDate) el.classList.add('active');
        });
        renderGames(currentSelectedMonth, currentSelectedDate);
    }

    function getScoreHtml(s1, s2) {
        if (!s1 || !s2) return `<div class="score-grid"><div class="vs-text">VS</div></div>`;
        
        const n1 = parseInt(s1, 10);
        const n2 = parseInt(s2, 10);
        
        let t1Class = n1 > n2 ? 'winner' : 'loser';
        let t2Class = n2 > n1 ? 'winner' : 'loser';
        
        return `
            <div class="score-grid">
                <span class="score-num home-score ${t1Class}">${s1}</span>
                <span class="arrow ${n1 > n2 ? '' : 'invisible'}">◀</span>
                <span class="final-text">FINAL</span>
                <span class="arrow ${n2 > n1 ? '' : 'invisible'}">▶</span>
                <span class="score-num away-score ${t2Class}">${s2}</span>
            </div>
        `;
    }

    function renderGames(monthKey, dateKey) {
        const container = document.getElementById('schedule-container');
        container.innerHTML = ''; 
        
        let filteredGames = allGames;
        if (monthKey !== 'all') {
            filteredGames = filteredGames.filter(game => {
                const d = new Date(game.date);
                if (isNaN(d)) return false;
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === monthKey;
            });
        }
        if (dateKey !== 'all') {
            filteredGames = filteredGames.filter(game => game.date === dateKey);
        }

        if (filteredGames.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:40px 20px;">此日期目前尚無安排賽程。</div>';
            return;
        }

        filteredGames.forEach(game => {
            const card = document.createElement('div');
            card.className = 'match-card';
            card.onclick = () => openGameDetails(game.id, game); 
            card.innerHTML = `
                <div class="match-info">${game.date} • ${game.time} • ${game.location}</div>
                <div class="scoreboard">
                    <div class="team">
                        ${game.HomeTeamLogo ? `<img src="${game.HomeTeamLogo}" class="team-logo" loading="lazy" decoding="async" onerror="this.style.display='none'">` : ''}
                        <div class="team-name">${game.HomeTeamName}</div>
                    </div>
                    <div class="score-box">
                        ${getScoreHtml(game.HomeTeamScore, game.AwayTeamScore)}
                    </div>
                    <div class="team">
                        ${game.AwayTeamLogo ? `<img src="${game.AwayTeamLogo}" class="team-logo" loading="lazy" decoding="async" onerror="this.style.display='none'">` : ''}
                        <div class="team-name">${game.AwayTeamName}</div>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="details-btn">查看數據與影像</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function openGameDetails(gameId, basicData) {
        const modal = document.getElementById('game-modal');
        const modalBody = document.getElementById('modal-body');
        modal.classList.add('show');
        document.body.style.overflow = 'hidden'; 
        
        modalBody.innerHTML = `
            <div class="modal-header-card">
                <div class="match-info" style="margin-bottom:10px;">${basicData.date} • ${basicData.time} • ${basicData.location}</div>
                <div class="scoreboard" style="margin-bottom:0;">
                    <div class="team">
                        ${basicData.HomeTeamLogo ? `<img src="${basicData.HomeTeamLogo}" class="team-logo" loading="lazy" decoding="async" onerror="this.style.display='none'">` : ''}
                        <div class="team-name">${basicData.HomeTeamName}</div>
                    </div>
                    <div class="score-box">${getScoreHtml(basicData.HomeTeamScore, basicData.AwayTeamScore)}</div>
                    <div class="team">
                        ${basicData.AwayTeamLogo ? `<img src="${basicData.AwayTeamLogo}" class="team-logo" loading="lazy" decoding="async" onerror="this.style.display='none'">` : ''}
                        <div class="team-name">${basicData.AwayTeamName}</div>
                    </div>
                </div>
            </div>
            <div id="advanced-stats" class="loading-text">🔄 正在抓取數據與賽事影像...</div>
        `;

        db.collection("boxScore").doc(gameId).get().then((doc) => {
            const stats = document.getElementById('advanced-stats');
            if (!doc.exists) {
                stats.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">目前尚無此場比賽的進階數據。</div>';
                return;
            }

            const adv = doc.data();
            let html = '';

            const hasMedia = adv.photoLink || adv.Q1Link || adv.Q2Link || adv.Q3Link || adv.Q4Link;
            if (hasMedia) {
                html += `<div class="media-links"><div class="media-links-title">Game Highlights (賽事重播與花絮)</div>`;
                if (adv.photoLink) html += `<a href="${adv.photoLink}" target="_blank" class="media-btn photo">📷 查看比賽相簿 (Photos)</a>`;
                if (adv.Q1Link) html += `<a href="${adv.Q1Link}" target="_blank" class="media-btn video">🎥 第 1 節 (Q1 Replay)</a>`;
                if (adv.Q2Link) html += `<a href="${adv.Q2Link}" target="_blank" class="media-btn video">🎥 第 2 節 (Q2 Replay)</a>`;
                if (adv.Q3Link) html += `<a href="${adv.Q3Link}" target="_blank" class="media-btn video">🎥 第 3 節 (Q3 Replay)</a>`;
                if (adv.Q4Link) html += `<a href="${adv.Q4Link}" target="_blank" class="media-btn video">🎥 第 4 節 (Q4 Replay)</a>`;
                html += `</div>`;
            }

            if(adv.HomeQ1 || adv.AwayQ1) {
                html += `
                <div class="section-title">各節比分 (Box Score)</div>
                <div class="table-responsive">
                    <table class="q-table">
                        <tr><th>球隊</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>總分</th></tr>
                        <tr>
                            <td style="font-weight:bold;">${basicData.HomeTeamName}</td>
                            <td>${adv.HomeQ1||'-'}</td><td>${adv.HomeQ2||'-'}</td><td>${adv.HomeQ3||'-'}</td><td>${adv.HomeQ4||'-'}</td>
                            <td style="font-weight:bold; color:#3b82f6;">${basicData.HomeTeamScore||'-'}</td>
                        </tr>
                        <tr>
                            <td style="font-weight:bold;">${basicData.AwayTeamName}</td>
                            <td>${adv.AwayQ1||'-'}</td><td>${adv.AwayQ2||'-'}</td><td>${adv.AwayQ3||'-'}</td><td>${adv.AwayQ4||'-'}</td>
                            <td style="font-weight:bold; color:#3b82f6;">${basicData.AwayTeamScore||'-'}</td>
                        </tr>
                    </table>
                </div>`;
            }

            stats.innerHTML = html;
        }).catch(err => {
            document.getElementById('advanced-stats').innerHTML = '<div style="text-align:center; color:#ef4444;">載入失敗，請稍後再試。</div>';
        });
    }

    function closeModal(isClick) {
        if (isClick) {
            document.getElementById('game-modal').classList.remove('show');
            document.body.style.overflow = 'auto'; 
        }
    }
</script>
</body>
</html>
